        const effValues = [];

        const tracePrice = {
            x: timestamps,
            y: prices,
            name: 'Market Price',
            type: 'scatter',
            mode: 'lines',
            line: { color: '#58a6ff', width: 2 },
            zorder: 10
        };

        const tracePivot = {
            x: timestamps,
            y: pivots,
            name: 'Pivot Price',
            type: 'scatter',
            mode: 'lines',
            line: { color: '#8b949e', width: 1, dash: 'dot' },
            zorder: 5
        };

        const traceBuys = {
            x: buyTimes,
            y: buyPrices,
            name: 'Grid Buys',
            type: 'scatter',
            mode: 'markers',
            marker: { color: '#3fb950', size: 4, opacity: 0.4 },
            hoverinfo: 'skip'
        };

        const traceSells = {
            x: sellTimes,
            y: sellPrices,
            name: 'Grid Sells',
            type: 'scatter',
            mode: 'markers',
            marker: { color: '#f85149', size: 4, opacity: 0.4 },
            hoverinfo: 'skip'
        };

        // Bot Attack Annotations
        const attackTraces = [];
        const attackTypes = [...new Set(attackPoints.map(p => p.type))];
        const typeColors = { 'frontrun': '#ffa657', 'sandwich': '#ff7b72', 'liquidity_drain': '#d29922' };

        attackTypes.forEach(type => {
            const pts = attackPoints.filter(p => p.type === type);
            attackTraces.push({
                x: pts.map(p => p.x),
                y: pts.map(p => p.y),
                name: `Bot Attack: ${type}`,
                mode: 'markers',
                type: 'scatter',
                marker: { 
                    symbol: 'diamond-open',
                    size: 12,
                    color: typeColors[type] || '#ffffff',
                    line: { width: 2 }
                },
                text: pts.map(p => `Eff: ${p.efficiency.toFixed(2)} | Slip: +${p.slippage}bps`),
                hoverinfo: 'name+x+text'
            });
        });

        const mainLayout = {
            title: 'Price & Order Grid (Adversarial View)',
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#c9d1d9' },
            margin: { t: 40, r: 40, b: 40, l: 60 },
            xaxis: { gridcolor: '#30363d', zeroline: false, linecolor: '#30363d' },
            yaxis: { gridcolor: '#30363d', linecolor: '#30363d', tickformat: '.4f', title: 'Price (USD)' },
            hovermode: 'closest',
            legend: { orientation: 'h', y: 1.1 }
        };

        const traceTotalPnl = {
            x: timestamps,
            y: totalPnl,
            name: 'Total PnL',
            fill: 'tozeroy',
            type: 'scatter',
            mode: 'lines',
            line: { color: '#d29922', width: 2 }
        };

        const pnlLayout = {
            title: 'Cumulative Performance (SOL)',
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#c9d1d9' },
            margin: { t: 40, r: 40, b: 40, l: 60 },
            xaxis: { gridcolor: '#30363d', zeroline: false, linecolor: '#30363d' },
            yaxis: { gridcolor: '#30363d', linecolor: '#30363d', title: 'PnL (SOL)' },
            hovermode: 'x unified',
            legend: { orientation: 'h', y: 1.1 }
        };

        Plotly.newPlot('main-chart', [traceBuys, traceSells, tracePivot, tracePrice, ...attackTraces], mainLayout);
        Plotly.newPlot('pnl-chart', [traceTotalPnl], pnlLayout);

        if (effValues.length > 0) {
            document.getElementById('eff-container').style.display = 'block';
            const avgEff = effValues.reduce((a, b) => a + b, 0) / effValues.length;
            document.getElementById('avg-eff').innerText = avgEff.toFixed(1) + '%';
            
            const traceEff = {
                x: effTimes,
                y: effValues,
                name: 'Counter-Attack Efficiency',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#3fb950' },
                marker: { size: 6 }
            };
            
            const effLayout = {
                title: 'Counter-Attack Efficiency (%)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#c9d1d9' },
                margin: { t: 40, r: 40, b: 40, l: 60 },
                xaxis: { gridcolor: '#30363d', zeroline: false, linecolor: '#30363d' },
                yaxis: { gridcolor: '#30363d', linecolor: '#30363d', range: [0, 105], title: 'Efficiency %' },
                hovermode: 'x unified'
            };
            Plotly.newPlot('eff-chart', [traceEff], effLayout);
        }
    </script>
</body>
</html>
