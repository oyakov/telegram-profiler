            line: { color: '#d29922', width: 2 }
        };

        const pnlLayout = {
            title: 'Cumulative Performance (SOL)',
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#c9d1d9' },
            margin: { t: 40, r: 40, b: 40, l: 60 },
            xaxis: { gridcolor: '#30363d', zeroline: false, linecolor: '#30363d' },
            yaxis: { gridcolor: '#30363d', linecolor: '#30363d', title: 'PnL (SOL)' },
            hovermode: 'x unified',
            legend: { orientation: 'h', y: 1.1 }
        };

        Plotly.newPlot('main-chart', [traceBuys, traceSells, tracePivot, tracePrice, ...attackTraces], mainLayout);
        Plotly.newPlot('pnl-chart', [traceTotalPnl], pnlLayout);

        if (effValues.length > 0) {
            document.getElementById('eff-container').style.display = 'block';
            const avgEff = effValues.reduce((a, b) => a + b, 0) / effValues.length;
            document.getElementById('avg-eff').innerText = avgEff.toFixed(1) + '%';
            
            const traceEff = {
                x: effTimes,
                y: effValues,
                name: 'Counter-Attack Efficiency',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#3fb950' },
                marker: { size: 6 }
            };
            
            const effLayout = {
                title: 'Counter-Attack Efficiency (%)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#c9d1d9' },
                margin: { t: 40, r: 40, b: 40, l: 60 },
                xaxis: { gridcolor: '#30363d', zeroline: false, linecolor: '#30363d' },
                yaxis: { gridcolor: '#30363d', linecolor: '#30363d', range: [0, 105], title: 'Efficiency %' },
                hovermode: 'x unified'
            };
            Plotly.newPlot('eff-chart', [traceEff], effLayout);
        }
    </script>
</body>
</html>
