global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fastapi'
    scrape_interval: 5s
    static_configs:
      - targets: ['app:8000']

  - job_name: 'celery'
    scrape_interval: 10s
    static_configs:
      - targets: ['worker-processing:8000', 'worker-connectors:8000']
