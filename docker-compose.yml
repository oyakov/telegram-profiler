services:
  postgres:
    image: ankane/pgvector:latest
    container_name: crm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crm-net

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crm-net

  app:
    build: .
    container_name: crm-app
    env_file: .env
    volumes:
      - .:/app
      - session_data:/app/sessions
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-net

  # Dedicated worker for AI processing (embeddings, extraction)
  worker-processing:
    build: .
    container_name: crm-worker-processing
    command: celery -A src.pipeline.celery_app worker --loglevel=info -Q processing -c 2
    env_file: .env
    volumes:
      - .:/app
      - session_data:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-net

  # Dedicated worker for background connectors (Telegram sync)
  worker-connectors:
    build: .
    container_name: crm-worker-connectors
    command: celery -A src.pipeline.celery_app worker --loglevel=info -Q connectors -c 1
    env_file: .env
    volumes:
      - .:/app
      - session_data:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-net

  beat:
    build: .
    container_name: crm-beat
    command: celery -A src.pipeline.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - crm-net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: crm-whisper
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-small}
      - ASR_ENGINE=${WHISPER_ENGINE:-openai_whisper}
    ports:
      - "9000:9000"
    volumes:
      - whisper_cache:/root/.cache/whisper
    networks:
      - crm-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8090}
    container_name: crm-frontend
    ports:
      - "${FRONTEND_PORT:-3005}:80"
    depends_on:
      - app
    networks:
      - crm-net

  # --- Observability ---

  prometheus:
    image: prom/prometheus:latest
    container_name: crm-prometheus
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - crm-net

volumes:
  pgdata:
  redisdata:
  whisper_cache:
  session_data:
  prometheus_data:

networks:
  crm-net:
    driver: bridge
