services:
  postgres:
    image: ankane/pgvector:latest
    container_name: crm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    # Tune for a 2 GB VPS (shared_buffers=25% RAM, realistic cache size)
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=25
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c synchronous_commit=off
    # NO public port binding — internal network only
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crm-net

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --loglevel warning
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
    # NO public port binding — internal network only
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 80M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crm-net

  app:
    build: .
    container_name: crm-app
    env_file: .env
    volumes:
      - session_data:/app/sessions
      - uploads_data:/app/uploads
    # Port 8000 exposed to host for local Vite dev proxy
    ports:
      - "8000:8000"
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-net
    restart: unless-stopped

  worker-processing:
    build: .
    container_name: crm-worker-processing
    # -c 1: single process; --pool=solo avoids fork overhead on a 2 GB VPS
    command: celery -A src.pipeline.celery_app worker --loglevel=warning -Q processing -c 1 --pool=solo
    env_file: .env
    volumes:
      - session_data:/app/sessions
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-net
    restart: unless-stopped

  worker-connectors:
    build: .
    container_name: crm-worker-connectors
    # --pool=solo: no subprocess forking, lower memory on a small VPS
    command: celery -A src.pipeline.celery_app worker --loglevel=warning -Q connectors -c 1 --pool=solo
    env_file: .env
    volumes:
      - session_data:/app/sessions
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-net
    restart: unless-stopped

  beat:
    build: .
    container_name: crm-beat
    command: celery -A src.pipeline.celery_app beat --loglevel=warning --schedule=/app/sessions/celerybeat-schedule
    env_file: .env
    volumes:
      - session_data:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - crm-net
    restart: unless-stopped

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: crm-whisper
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-small}
      - ASR_ENGINE=${WHISPER_ENGINE:-openai_whisper}
    # NO public port — internal network only
    volumes:
      - whisper_cache:/root/.cache/whisper
    networks:
      - crm-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = use page origin (correct for production behind nginx)
        # Override in .env.local for local dev: VITE_API_URL=http://localhost:8000
        - VITE_API_URL=${VITE_API_URL:-}
        # Passed at build time so the browser can authenticate with the backend
        - VITE_API_KEY=${API_KEY:-}
    container_name: crm-frontend
    # NO public port — nginx proxies internally
    expose:
      - "80"
    depends_on:
      - app
    networks:
      - crm-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - frontend
    networks:
      - crm-net
    restart: unless-stopped

  # --- Observability (internal only) ---
  # Start manually when needed: docker-compose --profile monitoring up -d prometheus
  # Access via SSH tunnel: ssh -L 9090:localhost:9090 root@<vps>
  prometheus:
    image: prom/prometheus:latest
    container_name: crm-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - crm-net
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  whisper_cache:
  session_data:
  uploads_data:
  prometheus_data:

networks:
  crm-net:
    driver: bridge
